name: Laravel CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Tests + análisis de código
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Tests & Análisis
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, curl, zip
          coverage: xdebug

      - name: 📦 Cachear dependencias Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 📦 Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: ⚙️ Preparar entorno
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=laravel_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: 🗄️ Ejecutar migraciones
        run: php artisan migrate --force

      - name: 🔍 Análisis estático (Pint — estilo de código)
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: ✅ Ejecutar tests con PHPUnit
        run: php artisan test --parallel --coverage-text
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root

  # ──────────────────────────────────────────────
  # JOB 2: Seguridad
  # ──────────────────────────────────────────────
  security:
    name: 🔒 Auditoría de Seguridad
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: 📦 Instalar dependencias
        run: composer install --no-interaction --prefer-dist

      - name: 🛡️ Verificar vulnerabilidades en dependencias
        run: composer audit

  # ──────────────────────────────────────────────
  # JOB 3: Build de assets (Vite/Node)
  # ──────────────────────────────────────────────
  assets:
    name: 🎨 Build de Assets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Instalar dependencias NPM
        run: npm ci

      - name: 🔨 Build producción
        run: npm run build

      - name: 📤 Guardar assets compilados
        uses: actions/upload-artifact@v4
        with:
          name: assets-build
          path: public/build/
          retention-days: 3
